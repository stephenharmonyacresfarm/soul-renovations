<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Soul Renovations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .logout-btn {
            background: #e67e22;
            color: white;
            padding: 0.5rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .logout-btn:hover {
            background: #d35400;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            display: none;
        }

        .message.success {
            background: #27ae60;
            color: white;
            display: block;
        }

        .message.error {
            background: #e74c3c;
            color: white;
            display: block;
        }

        .section {
            background: white;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e67e22;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button, .btn {
            background: #e67e22;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover, .btn:hover {
            background: #d35400;
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* Drop Zone */
        .drop-zone {
            border: 3px dashed #ccc;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
            margin-bottom: 1rem;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #e67e22;
            background: #fef5ec;
        }

        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .drop-zone-text {
            color: #777;
            font-size: 1.1rem;
        }

        .drop-zone-text span {
            color: #e67e22;
            font-weight: 600;
        }

        /* Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .preview-item {
            position: relative;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .preview-item .preview-name {
            font-size: 0.75rem;
            color: #555;
            padding: 0.3rem 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #f9f9f9;
        }

        .preview-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .preview-remove:hover {
            background: #c0392b;
        }

        .file-count {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* Progress Bar */
        .upload-progress {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
            display: none;
        }

        .upload-progress-bar {
            height: 100%;
            background: #e67e22;
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .photo-item {
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .photo-info {
            padding: 1rem;
            background: #f9f9f9;
        }

        .photo-info p {
            margin-bottom: 0.5rem;
            color: #555;
            font-size: 0.9rem;
        }

        .delete-btn {
            background: #e74c3c;
            width: 100%;
            margin-top: 0.5rem;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .review-item {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: #f9f9f9;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .review-stars {
            color: #f39c12;
            font-size: 1.2rem;
        }

        .review-text {
            margin: 1rem 0;
            line-height: 1.6;
        }

        .review-author {
            font-weight: bold;
            color: #2c3e50;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Panel - Soul Renovations</h1>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <div class="container">
        <div class="message" id="message"></div>

        <!-- Photo Management Section -->
        <div class="section">
            <h2>Add Photos</h2>
            <form id="photo-form">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-icon">📷</div>
                    <div class="drop-zone-text">
                        <span>Click to browse</span> or drag & drop photos here
                    </div>
                    <input type="file" id="photo" name="photo" accept="image/*" multiple style="display:none;">
                </div>

                <div class="file-count" id="file-count" style="display:none;"></div>
                <div class="preview-grid" id="preview-grid"></div>

                <div class="form-group">
                    <label for="alt_text">Description (optional, applies to all)</label>
                    <input type="text" id="alt_text" name="alt_text" placeholder="e.g., Kitchen renovation project">
                </div>

                <div class="upload-progress" id="upload-progress">
                    <div class="upload-progress-bar" id="upload-progress-bar"></div>
                </div>

                <button type="submit" id="upload-btn" disabled>Upload Photos</button>
            </form>

            <h2 style="margin-top: 2rem;">Existing Photos</h2>
            <div class="photo-grid" id="photo-grid">
                <p class="loading">Loading photos...</p>
            </div>
        </div>

        <!-- Review Management Section -->
        <div class="section">
            <h2>Add New Review</h2>
            <form id="review-form">
                <div class="form-group">
                    <label for="name">Customer Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" placeholder="e.g., Lancaster, PA" required>
                </div>

                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="review_text">Review Text</label>
                    <textarea id="review_text" name="review_text" required></textarea>
                </div>

                <button type="submit" id="review-btn">Add Review</button>
            </form>

            <h2 style="margin-top: 2rem;">Existing Reviews</h2>
            <div id="reviews-list">
                <p class="loading">Loading reviews...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Auth check — redirect to login if not authenticated
        async function checkAuth() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = 'admin-login.html';
                return false;
            }
            return true;
        }

        checkAuth().then(ok => {
            if (ok) {
                loadPhotos();
                loadReviews();
            }
        });

        // Show message
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message ' + type;
            setTimeout(() => { el.className = 'message'; }, 4000);
        }

        // ==================== IMAGE COMPRESSION ====================

        function compressImage(file, maxSize = 1600, quality = 0.8) {
            return new Promise((resolve) => {
                // If file is already small (under 500KB), skip compression
                if (file.size < 500 * 1024) {
                    resolve(file);
                    return;
                }

                const img = new Image();
                const url = URL.createObjectURL(file);

                img.onload = () => {
                    URL.revokeObjectURL(url);

                    let width = img.width;
                    let height = img.height;

                    // Resize if larger than maxSize
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = Math.round((height * maxSize) / width);
                            width = maxSize;
                        } else {
                            width = Math.round((width * maxSize) / height);
                            height = maxSize;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        // Create a new File object with .jpg extension
                        const compressed = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        resolve(compressed);
                    }, 'image/jpeg', quality);
                };

                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    resolve(file); // Fall back to original on error
                };

                img.src = url;
            });
        }

        // ==================== PHOTOS ====================

        // Track selected files
        let selectedFiles = [];

        // Drop zone setup
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('photo');
        const previewGrid = document.getElementById('preview-grid');
        const fileCount = document.getElementById('file-count');
        const uploadBtn = document.getElementById('upload-btn');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            addFiles(files);
        });

        fileInput.addEventListener('change', () => {
            addFiles(Array.from(fileInput.files));
            fileInput.value = '';
        });

        function addFiles(newFiles) {
            selectedFiles = selectedFiles.concat(newFiles);
            updatePreviews();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreviews();
        }

        function updatePreviews() {
            previewGrid.innerHTML = '';

            if (selectedFiles.length === 0) {
                fileCount.style.display = 'none';
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'Upload Photos';
                return;
            }

            fileCount.style.display = 'block';
            fileCount.textContent = selectedFiles.length + ' photo' + (selectedFiles.length !== 1 ? 's' : '') + ' selected';
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload ' + selectedFiles.length + ' Photo' + (selectedFiles.length !== 1 ? 's' : '');

            selectedFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'preview-item';

                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.onload = () => URL.revokeObjectURL(img.src);

                const name = document.createElement('div');
                name.className = 'preview-name';
                name.textContent = file.name;

                const removeBtn = document.createElement('button');
                removeBtn.className = 'preview-remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.type = 'button';
                removeBtn.onclick = () => removeFile(i);

                item.appendChild(img);
                item.appendChild(name);
                item.appendChild(removeBtn);
                previewGrid.appendChild(item);
            });
        }

        async function loadPhotos() {
            const { data: photos, error } = await sb
                .from('photos')
                .select('*')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('photo-grid');

            if (error) {
                grid.innerHTML = '<p style="color: #e74c3c;">Error loading photos.</p>';
                return;
            }

            if (!photos || photos.length === 0) {
                grid.innerHTML = '<p style="color: #999;">No photos yet.</p>';
                return;
            }

            grid.innerHTML = '';
            photos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `
                    <img src="${photo.public_url}" alt="${photo.alt_text || ''}">
                    <div class="photo-info">
                        <p><strong>Description:</strong> ${photo.alt_text || 'None'}</p>
                        <p><strong>Added:</strong> ${new Date(photo.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
                        <button class="delete-btn" onclick="deletePhoto(${photo.id}, '${photo.storage_path}')">Delete</button>
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        // Handle multi-photo upload
        document.getElementById('photo-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (selectedFiles.length === 0) {
                showMessage('Please select at least one photo.', 'error');
                return;
            }

            const altText = document.getElementById('alt_text').value;
            const total = selectedFiles.length;
            let uploaded = 0;
            let failed = [];

            uploadBtn.disabled = true;
            const progressContainer = document.getElementById('upload-progress');
            const progressBar = document.getElementById('upload-progress-bar');
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            for (let i = 0; i < total; i++) {
                const file = selectedFiles[i];
                uploadBtn.textContent = 'Compressing & uploading ' + (i + 1) + ' of ' + total + '...';
                progressBar.style.width = ((i / total) * 100) + '%';

                try {
                    // Compress image before upload
                    const compressed = await compressImage(file);

                    // Generate unique filename (always .jpg after compression)
                    const filename = Date.now() + '_' + Math.random().toString(36).substring(2, 8) + '.jpg';
                    const storagePath = filename;

                    // Upload compressed image to Supabase Storage
                    const { error: uploadError } = await sb.storage
                        .from('photos')
                        .upload(storagePath, compressed);

                    if (uploadError) {
                        failed.push(file.name + ': ' + uploadError.message);
                        continue;
                    }

                    // Get public URL
                    const { data: urlData } = sb.storage.from('photos').getPublicUrl(storagePath);
                    const publicUrl = urlData.publicUrl;

                    // Insert record into database
                    const { error: dbError } = await sb.from('photos').insert({
                        filename: filename,
                        alt_text: altText,
                        storage_path: storagePath,
                        public_url: publicUrl
                    });

                    if (dbError) {
                        failed.push(file.name + ': ' + dbError.message);
                        continue;
                    }

                    uploaded++;
                } catch (err) {
                    failed.push(file.name + ': ' + err.message);
                }
            }

            progressBar.style.width = '100%';

            if (failed.length === 0) {
                showMessage(uploaded + ' photo' + (uploaded !== 1 ? 's' : '') + ' uploaded successfully!', 'success');
            } else {
                showMessage(uploaded + ' uploaded, ' + failed.length + ' failed: ' + failed.join('; '), failed.length === total ? 'error' : 'success');
            }

            // Reset
            selectedFiles = [];
            updatePreviews();
            document.getElementById('alt_text').value = '';
            progressContainer.style.display = 'none';
            progressBar.style.width = '0%';
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Upload Photos';
            loadPhotos();
        });

        async function deletePhoto(id, storagePath) {
            if (!confirm('Are you sure you want to delete this photo?')) return;

            // Delete from storage
            await sb.storage.from('photos').remove([storagePath]);

            // Delete from database
            const { error } = await sb.from('photos').delete().eq('id', id);

            if (error) {
                showMessage('Error deleting photo: ' + error.message, 'error');
                return;
            }

            showMessage('Photo deleted successfully!', 'success');
            loadPhotos();
        }

        // ==================== REVIEWS ====================

        async function loadReviews() {
            const { data: reviews, error } = await sb
                .from('reviews')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('reviews-list');

            if (error) {
                list.innerHTML = '<p style="color: #e74c3c;">Error loading reviews.</p>';
                return;
            }

            if (!reviews || reviews.length === 0) {
                list.innerHTML = '<p style="color: #999;">No reviews yet.</p>';
                return;
            }

            list.innerHTML = '';
            reviews.forEach(review => {
                const item = document.createElement('div');
                item.className = 'review-item';
                item.innerHTML = `
                    <div class="review-header">
                        <div>
                            <div class="review-stars">${'\u2605'.repeat(review.rating)}</div>
                            <div class="review-author">${review.name}</div>
                            <div>${review.location}</div>
                        </div>
                        <button class="delete-btn" style="width:auto" onclick="deleteReview(${review.id})">Delete</button>
                    </div>
                    <div class="review-text">${review.review_text}</div>
                    <small>Added: ${new Date(review.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</small>
                `;
                list.appendChild(item);
            });
        }

        // Handle review addition
        document.getElementById('review-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('review-btn');
            btn.disabled = true;
            btn.textContent = 'Adding...';

            const name = document.getElementById('name').value;
            const location = document.getElementById('location').value;
            const rating = parseInt(document.getElementById('rating').value);
            const reviewText = document.getElementById('review_text').value;

            const { error } = await sb.from('reviews').insert({
                name: name,
                location: location,
                rating: rating,
                review_text: reviewText
            });

            if (error) {
                showMessage('Error adding review: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Add Review';
                return;
            }

            showMessage('Review added successfully!', 'success');
            btn.disabled = false;
            btn.textContent = 'Add Review';
            this.reset();
            loadReviews();
        });

        async function deleteReview(id) {
            if (!confirm('Are you sure you want to delete this review?')) return;

            const { error } = await sb.from('reviews').delete().eq('id', id);

            if (error) {
                showMessage('Error deleting review: ' + error.message, 'error');
                return;
            }

            showMessage('Review deleted successfully!', 'success');
            loadReviews();
        }

        // ==================== LOGOUT ====================

        async function handleLogout() {
            await sb.auth.signOut();
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
